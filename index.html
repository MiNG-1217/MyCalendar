<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>イベントカレンダー</title>
  <style>
    :root {
      --primary: #4a90e2;
      --border-color: #e0e0e0;
      --bg: #f8f9fa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: #333; overflow-x: hidden; }

    header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #fff; border-bottom: 1px solid var(--border-color); }
    .nav-btn { background: #eee; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; }

    /* カレンダーグリッド */
    .calendar-container { width: 100%; max-width: 1000px; margin: 0 auto; padding: 10px; touch-action: pan-y; }
    .week-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; background: #fff; border-bottom: 1px solid var(--border-color); }
    .week-cell { padding: 10px 0; font-size: 0.95rem; font-weight: bold; }
    .week-cell.sun { color: #e74c3c; }
    .week-cell.sat { color: #3498db; }

    .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-left: 1px solid var(--border-color); border-top: 1px solid var(--border-color); background: #fff; }
    .day-cell { min-height: 100px; border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); padding: 4px; position: relative; }
    
    .day-number { font-weight: bold; font-size: 1rem; display: flex; align-items: center; gap: 4px; }
    .holiday-name { color: #e74c3c; font-size: 0.75rem; font-weight: bold; }

    /* イベント帯 */
    .event-bar {
      margin-top: 4px; padding: 4px 6px; border-radius: 4px; color: #fff; font-size: 0.8rem;
      font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer;
    }

    /* モーダル・ポップアップ */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100; }
    .modal-content { background: #fff; padding: 20px; border-radius: 12px; width: 90%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 6px; }
    input[type="text"], input[type="date"], input[type="url"], input[type="color"] {
      width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem;
    }

    .genre-select-btn {
      width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; background: #fff; text-align: left; font-size: 1rem; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; align-items: center;
    }

    /* 2列グリッド表示 */
    .popup-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
    .popup-item-wrapper { position: relative; display: flex; align-items: center; }
    .popup-item {
      width: 100%; padding: 12px 28px 12px 10px; border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer; text-align: center; font-size: 0.95rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .edit-genre-btn {
      position: absolute; right: 5px; background: rgba(255,255,255,0.3); border: none; color: #fff; border-radius: 4px; padding: 2px 6px; font-size: 0.75rem; cursor: pointer; font-weight: bold;
    }

    .btn-primary { background: var(--primary); color: #fff; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px; }
    .btn-secondary { background: #e0e0e0; color: #333; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    .btn-close { background: #888; color: #fff; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; float: right; }
    .btn-danger { background: #e74c3c; color: #fff; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; }
  </style>
</head>
<body>

  <header>
    <button class="nav-btn" id="prevBtn">&lt; 前月</button>
    <h2 id="monthTitle" style="font-weight: bold;">2026年 7月</h2>
    <button class="nav-btn" id="nextBtn">&gt; 次月</button>
  </header>

  <div class="calendar-container" id="swipeArea">
    <div class="week-header">
      <div class="week-cell">月</div><div class="week-cell">火</div><div class="week-cell">水</div>
      <div class="week-cell">木</div><div class="week-cell">金</div><div class="week-cell sat">土</div><div class="week-cell sun">日</div>
    </div>
    <div class="days-grid" id="daysGrid"></div>
  </div>

  <button style="position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; border-radius: 28px; background: var(--primary); color: #fff; border: none; font-size: 2rem; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);" onclick="openModal()">＋</button>

  <!-- イベント追加モーダル -->
  <div class="modal" id="eventModal">
    <div class="modal-content">
      <button class="btn-close" onclick="closeModal()">閉じる</button>
      <h3 style="margin-bottom: 15px;">イベント追加</h3>
      <form id="eventForm">
        <div class="form-group">
          <label>イベント名</label>
          <input type="text" id="title" required placeholder="例：〇〇フェス">
        </div>

        <div class="form-group">
          <label>ジャンル (タップして選択)</label>
          <button type="button" class="genre-select-btn" id="genreBtn" onclick="openGenrePopup()">
            <span id="selectedGenreName">選択してください</span> ▼
          </button>
        </div>

        <!-- 「音楽・ライブ」選択時のみ表示される時間入力欄 -->
        <div class="form-group" id="timeArea" style="display: none;">
          <label>時間 (数字4桁入力 例: 1400)</label>
          <div style="display: flex; gap: 10px; align-items: center;">
            <input type="text" id="startTime" placeholder="1400" maxlength="4" style="width: 100px; text-align: center;">
            〜
            <input type="text" id="endTime" placeholder="1800" maxlength="4" style="width: 100px; text-align: center;">
          </div>
        </div>

        <div class="form-group">
          <label>期間</label>
          <div style="display: flex; gap: 10px;">
            <input type="date" id="startDate" required>
            <input type="date" id="endDate" required>
          </div>
        </div>

        <div class="form-group">
          <label>場所 (Googleマップ連携)</label>
          <input type="text" id="location" placeholder="例：東京ドーム">
        </div>

        <div class="form-group">
          <label>関連URL</label>
          <input type="url" id="linkUrl" placeholder="https://example.com">
        </div>

        <div class="form-group">
          <label>メモ</label>
          <input type="text" id="memo" placeholder="自由記入">
        </div>

        <button type="submit" class="btn-primary">保存する</button>
      </form>
    </div>
  </div>

  <!-- ジャンル選択ポップアップ（2列表示） -->
  <div class="modal" id="genreModal">
    <div class="modal-content">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3 style="font-weight: bold;">ジャンルを選択</h3>
        <button type="button" class="btn-secondary" onclick="openGenreEditModal()">＋ 追加</button>
      </div>
      
      <div class="popup-grid" id="genrePopupList"></div>

      <button class="btn-primary" style="background:#666; margin-top: 20px;" onclick="closeGenrePopup()">キャンセル</button>
    </div>
  </div>

  <!-- ジャンル追加・編集モーダル -->
  <div class="modal" id="genreEditModal">
    <div class="modal-content">
      <h3 id="genreEditTitle" style="margin-bottom: 15px;">ジャンルの設定</h3>
      <div class="form-group">
        <label>ジャンル名</label>
        <input type="text" id="genreInputName" placeholder="例：イベント">
      </div>
      <div class="form-group">
        <label>表示カラー</label>
        <input type="color" id="genreInputColor" value="#4a90e2" style="height: 45px; cursor: pointer;">
      </div>
      <button type="button" class="btn-primary" onclick="saveGenre()">ジャンルを保存</button>
      <button type="button" class="btn-danger" id="deleteGenreBtn" onclick="deleteGenre()" style="display:none;">このジャンルを削除</button>
      <button type="button" class="btn-secondary" style="width: 100%; margin-top: 8px;" onclick="closeGenreEditModal()">キャンセル</button>
    </div>
  </div>

  <script>
    const holidays = {
      '2026-01-01': '元日', '2026-01-12': '成人の日', '2026-02-11': '建国記念の日',
      '2026-02-23': '天皇誕生日', '2026-03-20': '春分の日', '2026-04-29': '昭和の日',
      '2026-05-03': '憲法記念日', '2026-05-04': 'みどもの日', '2026-05-05': 'こどもの日',
      '2026-07-20': '海の日', '2026-08-11': '山の日', '2026-09-21': '敬老の日',
      '2026-09-23': '秋分の日', '2026-10-12': 'スポーツの日', '2026-11-03': '文化の日',
      '2026-11-23': '勤労感謝の日'
    };

    const defaultCategories = [
      { id: 'cat_1', name: 'グルメ', color: '#ff9f43' },
      { id: 'cat_2', name: '音楽・ライブ', color: '#54a0ff' },
      { id: 'cat_3', name: 'キャラクター', color: '#ff6b6b' },
      { id: 'cat_4', name: 'その他', color: '#10ac84' }
    ];

    let categories = JSON.parse(localStorage.getItem('my_categories')) || defaultCategories;
    let currentDate = new Date();
    let events = JSON.parse(localStorage.getItem('my_events')) || [];
    let selectedCategory = categories[0];
    let editingGenreId = null;

    // 時間フォーマット変換 (1400 -> 14:00)
    function formatTimeInput(input) {
      input.addEventListener('blur', () => {
        let val = input.value.replace(/\D/g, '');
        if (val.length === 4) {
          input.value = `${val.substring(0, 2)}:${val.substring(2, 4)}`;
        }
      });
    }
    formatTimeInput(document.getElementById('startTime'));
    formatTimeInput(document.getElementById('endTime'));

    function initGenreSelection() {
      if (categories.length > 0) {
        updateSelectedGenre(categories[0]);
      }
    }

    // 選択中のジャンルを更新＆「音楽・ライブ」のときだけ時間入力欄を表示
    function updateSelectedGenre(cat) {
      selectedCategory = cat;
      document.getElementById('selectedGenreName').innerText = cat.name;
      const timeArea = document.getElementById('timeArea');
      
      if (cat.name === '音楽・ライブ') {
        timeArea.style.display = 'block';
      } else {
        timeArea.style.display = 'none';
        document.getElementById('startTime').value = '';
        document.getElementById('endTime').value = '';
      }
    }

    // カレンダー描画
    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      document.getElementById('monthTitle').innerText = `${year}年 ${month + 1}月`;

      const grid = document.getElementById('daysGrid');
      grid.innerHTML = '';

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      let dayOfWeek = firstDay.getDay() - 1; 
      if (dayOfWeek === -1) dayOfWeek = 6;

      for (let i = 0; i < dayOfWeek; i++) {
        const cell = document.createElement('div');
        cell.className = 'day-cell';
        cell.style.background = '#f9f9f9';
        grid.appendChild(cell);
      }

      for (let date = 1; date <= lastDay.getDate(); date++) {
        const cell = document.createElement('div');
        cell.className = 'day-cell';
        
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(date).padStart(2, '0')}`;
        const holiday = holidays[dateStr];

        cell.innerHTML = `
          <div class="day-number">
            ${date}
            ${holiday ? `<span class="holiday-name">${holiday}</span>` : ''}
          </div>
        `;

        events.forEach(ev => {
          if (dateStr >= ev.startDate && dateStr <= ev.endDate) {
            const bar = document.createElement('div');
            bar.className = 'event-bar';
            const cat = categories.find(c => c.id === ev.category) || { color: '#888' };
            bar.style.backgroundColor = cat.color;
            bar.innerText = ev.title + (ev.startTime ? ` (${ev.startTime})` : '');
            bar.onclick = (e) => { e.stopPropagation(); showEventDetail(ev); };
            cell.appendChild(bar);
          }
        });

        grid.appendChild(cell);
      }
    }

    // 月切り替え
    function changeMonth(diff) {
      currentDate.setMonth(currentDate.getMonth() + diff);
      renderCalendar();
    }
    document.getElementById('prevBtn').onclick = () => changeMonth(-1);
    document.getElementById('nextBtn').onclick = () => changeMonth(1);

    // モーダル操作
    function openModal() { document.getElementById('eventModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('eventModal').style.display = 'none'; }

    // ジャンル選択ポップアップ（2列表示）
    function openGenrePopup() {
      const list = document.getElementById('genrePopupList');
      list.innerHTML = '';
      categories.forEach(cat => {
        const wrapper = document.createElement('div');
        wrapper.className = 'popup-item-wrapper';

        const item = document.createElement('div');
        item.className = 'popup-item';
        item.style.backgroundColor = cat.color;
        item.innerText = cat.name;
        item.onclick = () => {
          updateSelectedGenre(cat);
          closeGenrePopup();
        };

        const editBtn = document.createElement('button');
        editBtn.className = 'edit-genre-btn';
        editBtn.innerText = '編集';
        editBtn.onclick = (e) => {
          e.stopPropagation();
          openGenreEditModal(cat);
        };

        wrapper.appendChild(item);
        wrapper.appendChild(editBtn);
        list.appendChild(wrapper);
      });
      document.getElementById('genreModal').style.display = 'flex';
    }
    function closeGenrePopup() { document.getElementById('genreModal').style.display = 'none'; }

    // ジャンル編集モーダル
    function openGenreEditModal(cat = null) {
      if (cat) {
        editingGenreId = cat.id;
        document.getElementById('genreEditTitle').innerText = 'ジャンルを編集';
        document.getElementById('genreInputName').value = cat.name;
        document.getElementById('genreInputColor').value = cat.color;
        document.getElementById('deleteGenreBtn').style.display = 'block';
      } else {
        editingGenreId = null;
        document.getElementById('genreEditTitle').innerText = 'ジャンルを追加';
        document.getElementById('genreInputName').value = '';
        document.getElementById('genreInputColor').value = '#4a90e2';
        document.getElementById('deleteGenreBtn').style.display = 'none';
      }
      document.getElementById('genreEditModal').style.display = 'flex';
    }
    function closeGenreEditModal() { document.getElementById('genreEditModal').style.display = 'none'; }

    // ジャンル保存
    function saveGenre() {
      const name = document.getElementById('genreInputName').value.trim();
      const color = document.getElementById('genreInputColor').value;
      if (!name) return alert('ジャンル名を入力してください');

      if (editingGenreId) {
        const cat = categories.find(c => c.id === editingGenreId);
        if (cat) { cat.name = name; cat.color = color; }
      } else {
        const newCat = { id: 'cat_' + Date.now(), name: name, color: color };
        categories.push(newCat);
      }

      localStorage.setItem('my_categories', JSON.stringify(categories));
      closeGenreEditModal();
      openGenrePopup();
      initGenreSelection();
      renderCalendar();
    }

    // ジャンル削除
    function deleteGenre() {
      if (!editingGenreId) return;
      if (confirm('このジャンルを削除しますか？')) {
        categories = categories.filter(c => c.id !== editingGenreId);
        localStorage.setItem('my_categories', JSON.stringify(categories));
        closeGenreEditModal();
        openGenrePopup();
        initGenreSelection();
        renderCalendar();
      }
    }

    // イベント保存
    document.getElementById('eventForm').onsubmit = (e) => {
      e.preventDefault();
      const newEvent = {
        title: document.getElementById('title').value,
        category: selectedCategory.id,
        startDate: document.getElementById('startDate').value,
        endDate: document.getElementById('endDate').value,
        startTime: document.getElementById('startTime').value,
        endTime: document.getElementById('endTime').value,
        location: document.getElementById('location').value,
        linkUrl: document.getElementById('linkUrl').value,
        memo: document.getElementById('memo').value
      };

      events.push(newEvent);
      localStorage.setItem('my_events', JSON.stringify(events));
      closeModal();
      document.getElementById('eventForm').reset();
      initGenreSelection();
      renderCalendar();
    };

    function showEventDetail(ev) {
      let msg = `【${ev.title}】\n期間: ${ev.startDate} 〜 ${ev.endDate}`;
      if (ev.startTime) msg += `\n時間: ${ev.startTime} 〜 ${ev.endTime}`;
      if (ev.location) msg += `\n場所: ${ev.location}`;
      if (ev.memo) msg += `\nメモ: ${ev.memo}`;
      
      if (ev.location && confirm(msg + '\n\nGoogleマップで開きますか？')) {
        window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(ev.location)}`, '_blank');
      } else if (ev.linkUrl) {
        window.open(ev.linkUrl, '_blank');
      }
    }

    initGenreSelection();
    renderCalendar();
  </script>
</body>
</html>
